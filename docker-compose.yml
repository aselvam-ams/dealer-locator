services:
  db:
    image: postgis/postgis:16-3.4
    container_name: dealer-locator-db
    environment:
      POSTGRES_USER: dealer
      POSTGRES_PASSWORD: dealer
      POSTGRES_DB: dealer_locator
    ports:
      - "5433:5432"
    volumes:
      - dealer_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealer -d dealer_locator"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dealer_pg_data:
